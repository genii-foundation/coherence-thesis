name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (types, lint, unit, build, drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          COHERENCE_BOOTSTRAPPING: "1"

      - name: Materialize manuscript outputs from source
        run: npm run manuscripts:prepare

      - name: Validate manuscript references and artifact freshness
        run: npm run manuscripts:validate

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ github.token }}
          UPDATES_REQUIRED_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.sha }}

      - name: Check source and durable publishing state remain clean
        run: |
          npm run manuscripts:source-boundary
          if ! git diff --exit-code -- content/series; then
            echo "::error::Automatic generation changed durable publishing state. Run the explicit manuscript publishing workflow and commit the reviewed result."
            exit 1
          fi

      - name: Check Updates fallback cache is current
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --exit-code -- src/generated/updates.json; then
            echo "::error::src/generated/updates.json is behind main. Run 'npm run updates:generate' after refreshing origin/main and commit the result."
            exit 1
          fi

      - name: Verify Updates includes the main push
        if: github.event_name == 'push'
        run: npm run updates:verify -- "$GITHUB_SHA"

      - name: Dependency audit (advisory)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          COHERENCE_BOOTSTRAPPING: "1"

      - name: Install Playwright browsers
        # The desktop project runs Chromium; the mobile project emulates
        # iPhone 15, which runs on WebKit.
        run: npx playwright install --with-deps chromium webkit

      - name: Run end-to-end tests
        run: npm run test:e2e
        env:
          CI: "true"
          GITHUB_TOKEN: ${{ github.token }}
          UPDATES_REQUIRED_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.sha }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
