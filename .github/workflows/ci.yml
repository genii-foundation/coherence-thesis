name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (types, lint, unit, build, drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          COHERENCE_BOOTSTRAPPING: "1"

      - name: Validate manuscript references and artifact freshness
        run: npm run manuscripts:validate

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Check generated browser data is committed and current
        run: |
          if ! git diff --exit-code -- public/data; then
            echo "::error::public/data is out of date. Run 'npm run manuscripts:compile' and commit the result."
            exit 1
          fi

      - name: Dependency audit (advisory)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          COHERENCE_BOOTSTRAPPING: "1"

      - name: Install Playwright browsers
        # The desktop project runs Chromium; the mobile project emulates
        # iPhone 15, which runs on WebKit.
        run: npx playwright install --with-deps chromium webkit

      - name: Run end-to-end tests
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
