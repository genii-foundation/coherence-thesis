name: Supabase Migrate

# Applies supabase/migrations to the production Supabase project whenever
# migration files land on main. Both shipped migrations are idempotent
# (if-not-exists / or-replace / drop-if-exists guards), so re-application is
# safe even if a migration was previously run by hand.
#
# Requires two repository secrets:
#   SUPABASE_ACCESS_TOKEN  personal access token (supabase.com/dashboard/account/tokens)
#   SUPABASE_DB_PASSWORD   the project's database password
# Until both are set, the job skips with a warning instead of failing the merge.

on:
  push:
    branches: [main]
    paths:
      - "supabase/**"
  workflow_dispatch:

concurrency:
  group: supabase-migrate
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: zcnbjrewrcrbxkeishfw

jobs:
  migrate:
    name: Push migrations to production
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Check credentials
        id: creds
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD repository secrets are not set. Skipping automatic migration; run this workflow manually after adding them."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: supabase/setup-cli@v1
        if: steps.creds.outputs.configured == 'true'
        with:
          version: latest

      - name: Link project
        if: steps.creds.outputs.configured == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push migrations
        if: steps.creds.outputs.configured == 'true'
        run: supabase db push
